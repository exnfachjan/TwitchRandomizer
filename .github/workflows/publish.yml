name: Publish to Modrinth

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR from Release
        run: |
          curl -s https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' \
            | xargs -I {} curl -L -O {}

      - uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ogCyDo14
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: *.jar
          version: ${{ github.ref_name }}
          version-type: release
          loaders: paper spigot
          game-versions: 1.21.x
          changelog: ${{ github.event.release.body }}
