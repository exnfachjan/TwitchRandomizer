# TwitchRandomizer – Configuration
twitch:
  channels:
    - YOUR_CHANNEL_HERE
  oauth_token: "YOUR_TOKEN_HERE"
  trigger_interval_seconds: 30.0
  debug: false
  triggers:
    subscriptions:
      enabled: true
    bits:
      enabled: true
      bits_per_trigger: 500
    chat_test:
      enabled: true
    sim_gift:
      enabled: true
    sim_giftbomb:
      enabled: true
      default_count: 5

challenge:
  auto_spectator_on_death: false
  pause_on_death: true
  pause_if_all_spectator: true

reset:
  confirm_window_seconds: 30
  randomize_seed: true
  fallback_server: "lobby"
  transfer_wait_ticks: 60
  title_lead_ticks: 40

restart-on-reset: false

language:
  mode: auto
  default: en

events:
  weights:
    spawn_mobs: 18
    potion: 16
    give_item: 12
    inv_shuffle: 10
    damage_half_heart: 12
    fire: 10
    nasa_call: 8
    hell_is_calling: 8
    safe_creepers: 7
    floor_is_lava: 8
    slippery_ground: 7
    hot_potato: 6
    tnt_rain: 6
    anvil_rain: 5
    no_crafting: 6
    equipment_shuffle: 8
    teleport: 5
    fake_totem: 5
    clear_inventory: 4
    skyblock: 5
    permanent_hearts: 10

  settings:
    no_crafting:
      min_seconds: 5
      max_seconds: 15
    hot_potato:
      duration_seconds: 10
      mode: explode
      explosion_power: 2.0
    safe_creepers:
      count: 3
      radius: 2
      lifetime_seconds: 8
      powered: true
    floor_is_lava:
      min_seconds: 10
      max_seconds: 180
    slippery_ground:
      min_seconds: 10
      max_seconds: 180
    tnt_rain:
      duration_seconds: 30
      radius: 25
      interval_ticks: 6
    anvil_rain:
      duration_seconds: 30
      radius: 25
      interval_ticks: 6
    skyblock:
      radius: 2

stats:
  deaths: 0
